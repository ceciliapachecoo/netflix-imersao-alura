<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione seu perfil da Netflix para continuar assistindo">
    <title>Netflix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main>
        <button id="theme-toggle" aria-label="Alternar tema">🌙</button>
        <section>
            <h1>NETFLIX</h1>
            <h2>Quem está assistindo?</h2>
            <ul class="profiles">
                <li class="profile">
                    <button aria-label="Selecionar Perfil 1" data-profile-name="Aurora" data-profile-image="./assets/perfil-1.jpg">
                        <img src="./assets/perfil-1.jpg" alt="Imagem 1" loading="lazy">
                        <span>Aurora</span>
                    </button>
                </li>
                <li class="profile">
                    <button aria-label="Selecionar Perfil 2" data-profile-name="Olivia" data-profile-image="./assets/perfil-2.jpg">
                        <img src="./assets/perfil-2.jpg" alt="Imagem 2" loading="lazy">
                        <span>Olivia</span>
                    </button>
                </li>
                <li class="profile">
                    <button aria-label="Selecionar Perfil 3" data-profile-name="Kate" data-profile-image="./assets/perfil-3.jpg">
                        <img src="./assets/perfil-3.jpg" alt="Imagem 3" loading="lazy">
                        <span>Kate</span>
                    </button>
                </li>
                <li class="profile">
                    <button aria-label="Selecionar Perfil 4" data-profile-name="Victoria" data-profile-image="./assets/perfil-4.jpg">
                        <img src="./assets/perfil-4.jpg" alt="Imagem 4" loading="lazy">
                        <span>Victoria</span>
                    </button>
                </li>
            </ul>
            <button id="manage-profiles" class="manage-profiles" aria-label="Gerenciar perfis">Gerenciar perfis</button>
            
        </section>
    </main>

</body>
</html>
